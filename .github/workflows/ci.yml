name: CI

on:
  # Automatic trigger when PR is opened or updated
  pull_request:
    types:
      - opened              # PR is created
      - ready_for_review    # Draft PR marked as ready
      - synchronize         # New commits pushed to PR
      - reopened            # Closed PR is reopened
    branches:
      - main
      - 'release/*'
  
  # Automatic trigger when code is pushed to protected branches (after merge)
  push:
    branches:
      - main
      - 'release/*'
  
  # Manual trigger from PR UI or Actions tab (backup option)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running CI checks'
        required: false
        default: 'Manual trigger'

jobs:
  validate:
    name: TypeScript Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript validation
        run: npm run validate

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Check build output
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Error: dist/index.js was not generated"
            exit 1
          fi
          if [ ! -f "dist/index.d.ts" ]; then
            echo "Error: dist/index.d.ts was not generated"
            exit 1
          fi
          echo "Build output verified successfully"

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  prettier:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npm run prettier

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  test-example-node:
    name: Node TypeScript Example
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies and build library
        run: npm ci && npm run build

      - name: Install example dependencies
        working-directory: examples/node-ts
        run: npm ci

      - name: Build Node TypeScript example
        working-directory: examples/node-ts
        run: npm run build

  test-example-react:
    name: React Vite Example (Playwright)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies and build library
        run: npm ci && npm run build

      - name: Install example dependencies
        working-directory: examples/react-vite
        run: npm ci

      - name: Install Playwright browsers
        working-directory: examples/react-vite
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build and run Playwright tests
        working-directory: examples/react-vite
        run: npm test -- --project=Chromium --project=Firefox --project="WebKit (Safari)"

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: examples/react-vite/playwright-report/
          retention-days: 7
